name: walktogether
description: "WalkTogether — Find safe, verified walking partners nearby. 100% free, safety-first, community-first."
publish_to: "none"
version: 1.7.0+27

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  socket_io_client: ^2.0.3+1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/locales/
